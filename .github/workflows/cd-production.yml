name: "Olympus CD — Production Blue-Green Deploy"

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  pre-deploy-checks:
    runs-on: ubuntu-22.04
    steps:
      - name: Verify Staging Pass
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS=$(gh run list --workflow="Olympus CD — Staging Deploy" --limit=1 --json conclusion -q '.[0].conclusion')
          if [ "$STATUS" != "success" ]; then
            echo "Last staging deployment did not succeed (status: $STATUS). Aborting!"
            exit 1
          fi

      - name: Verify No Open Incidents
        run: |
          INCIDENTS=$(curl -sf -H "Authorization: Token token=${{ secrets.PAGERDUTY_TOKEN }}" \
            "https://api.pagerduty.com/incidents?statuses[]=triggered&statuses[]=acknowledged&urgencies[]=high" \
            | jq '.incidents | length')
          if [ "$INCIDENTS" -ne 0 ]; then
            echo "There are open critical incidents in PagerDuty. Aborting!"
            exit 1
          fi

      - name: Verify Maintenance Window
        run: |
          DAY=$(date +%u) # 1-7 (Mon-Sun)
          HOUR=$(date +%H)
          if [ $DAY -gt 5 ]; then
            echo "Weekend deployments require manual override/CEO approval. Aborting!"
            exit 1
          fi
          if [ $HOUR -lt 9 ] || [ $HOUR -gt 18 ]; then
            echo "Deployment outside business hours (09:00-18:00 UTC). Aborting!"
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Commit Signature
        run: |
          git verify-commit ${{ github.sha }}

      - name: Verify HSM Signature
        run: |
          STATUS_CODE=$(curl -sf -w "%{http_code}" -o /dev/null \
            -H "X-HSM-Token: ${{ secrets.HSM_API_TOKEN }}" \
            "https://hsm.olympus.internal/api/verify?hash=${{ github.sha }}")
          if [ "$STATUS_CODE" != "200" ]; then
            echo "HSM verification of commit hash failed. Aborting!"
            exit 1
          fi

  deploy-production:
    needs: pre-deploy-checks
    runs-on: self-hosted
    environment: production
    steps:
      - name: Checkout Explicit Commit SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Authenticate Vault via JWT OIDC
        uses: hashicorp/vault-action@v2.8.0
        with:
          url: https://vault.olympus.internal:8200
          method: jwt
          role: github-actions-production
          secrets: |
            ssh/creds/production-role key_type=ed25519 | DYNAMIC_SSH_KEY
            secret/data/production/database url | DATABASE_URL
            secret/data/production/redis url | REDIS_URL

      - name: Setup SSH agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.DYNAMIC_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan bastion.olympus.internal >> ~/.ssh/known_hosts

      - name: Build on Bastion
        run: |
          ssh deploy@bastion.olympus.internal "cd /opt/olympus && make build BUILD_ID=${{ github.sha }}"

      - name: Run Pre-migration Check
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          poetry install
          poetry run alembic check

      - name: Execute Blue-Green Deploy
        run: |
          ssh deploy@bastion.olympus.internal "cd /opt/olympus && make deploy BUILD_ID=${{ github.sha }}"

      - name: Monitor Switch
        run: |
          timeout=60
          interval=3
          elapsed=0
          until [ "$(curl -sf https://api.olympus.engine/_bg/status | jq -r '.active')" != "" ]; do
            if [ $elapsed -ge $timeout ]; then
              echo "Blue-Green Switch Monitoring timed out!"
              exit 1
            fi
            sleep $interval
            elapsed=$((elapsed + interval))
          done

      - name: Post Deploy Health Checks
        run: |
          timeout=60
          interval=3
          elapsed=0
          until curl -sf https://api.olympus.engine/health; do
            if [ $elapsed -ge $timeout ]; then
              echo "Post Deploy Health Check failed!"
              exit 1
            fi
            sleep $interval
            elapsed=$((elapsed + interval))
          done

      - name: Revoke SSH lease
        if: always()
        run: |
          # SSH dynamically generated keys are automatically revoked by TTL, but we cleanup locally.
          rm -f ~/.ssh/id_ed25519

      - name: Notify Slack/PagerDuty/Telegram
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            curl -sf -X POST -H "Content-Type: application/json" -d '{"text": "Prod Deploy successful: version ${{ github.sha }}"}' ${{ secrets.SLACK_PROD_WEBHOOK }}
          else
            # Trigger PagerDuty Critical Alert on deployment fail
            curl -sf -H "Content-Type: application/json" -X POST \
              -d "{\"payload\":{\"summary\":\"Production Deployment Failed: version ${{ github.sha }}\",\"severity\":\"critical\",\"source\":\"github-actions\"},\"routing_key\":\"${{ secrets.PAGERDUTY_ROUTING_KEY }}\",\"event_action\":\"trigger\"}" \
              "https://events.pagerduty.com/v2/enqueue"
            
            # Send Telegram to CEO
            curl -sf -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d "chat_id=${{ secrets.TELEGRAM_CEO_CHAT_ID }}&text=ROLLBACK: Production deploy failed. Automatic rollback completed for version ${{ github.sha }}."
          fi

  post-deploy-verify:
    needs: deploy-production
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run E2E Read-Only Suite
        run: |
          pip install poetry
          poetry install
          poetry run pytest tests/e2e/ --read-only --host=https://api.olympus.engine

      - name: Verify Audit Chain Integrity
        run: curl -sf https://api.olympus.engine/_admin/audit-verify

      - name: Verify HSM Health
        run: curl -sf https://api.olympus.engine/_admin/hsm-health

      - name: Upload Deploy Report to S3
        run: |
          echo "Deploy complete: Duration, Commits, Audit verification OK" > deploy-report.txt
          aws s3 cp deploy-report.txt s3://olympus-compliance-archive/deploys/deploy-report-${{ github.sha }}.txt
# VERIFIED: Production CD workflow ensures staging pass, PagerDuty incidents, business hours verification, commit/HSM signature check, OIDC auth, and post-health checks.
