server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name olympus.engine;

    ssl_certificate /etc/step-ca/certs/server.crt;
    ssl_certificate_key /etc/step-ca/certs/server.key;
    ssl_protocols TLSv1.3;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;

    root /var/www/olympus/current/dist;
    index index.html;

    include /etc/openresty/snippets/security-headers.conf;

    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        access_log off;
    }

    location ~* \.wasm$ {
        types { application/wasm wasm; }
        add_header Cache-Control "public, immutable";
        expires 1y;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
