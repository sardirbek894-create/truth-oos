server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.olympus.engine;

    ssl_certificate /etc/step-ca/certs/server.crt;
    ssl_certificate_key /etc/step-ca/certs/server.key;
    ssl_trusted_certificate /etc/step-ca/certs/ca.crt;
    ssl_protocols TLSv1.3;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    location /_bg/ {
        proxy_ssl_certificate /etc/step-ca/certs/client.crt;
        proxy_ssl_certificate_key /etc/step-ca/certs/client.key;
        proxy_ssl_trusted_certificate /etc/step-ca/certs/ca.crt;
        proxy_ssl_verify on;
        proxy_ssl_verify_depth 2;
        content_by_lua_file /etc/openresty/lua/bluegreen_switch.lua;
    }

    location /health {
        limit_req zone=api burst=10 nodelay;
        include /etc/openresty/snippets/security-headers.conf;
        proxy_pass http://app_blue;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Trace-ID $http_x_trace_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /ready {
        limit_req zone=api burst=5 nodelay;
        include /etc/openresty/snippets/security-headers.conf;
        proxy_pass http://app_blue;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 2s;
        proxy_read_timeout 5s;
    }

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_conn addr 10;
        include /etc/openresty/snippets/security-headers.conf;
        include /etc/openresty/snippets/rate-limit.conf;
        proxy_ssl_certificate /etc/step-ca/certs/client.crt;
        proxy_ssl_certificate_key /etc/step-ca/certs/client.key;
        proxy_ssl_trusted_certificate /etc/step-ca/certs/ca.crt;
        proxy_ssl_verify on;
        proxy_pass http://app_blue;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Trace-ID $http_x_trace_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location /ws/ {
        proxy_pass http://app_blue;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
