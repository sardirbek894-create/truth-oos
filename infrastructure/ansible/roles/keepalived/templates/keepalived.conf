vrrp_script chk_nginx {
    script "/usr/bin/curl -f -s -o /dev/null http://127.0.0.1/health"
    interval 2
    weight 2
    fall 3
    rise 2
}

vrrp_instance VI_OLYMPUS {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass {{ lookup('env', 'KEEPALIVED_AUTH_PASS') }}
    }
    virtual_ipaddress {
        10.0.1.100/24
    }
    track_script {
        chk_nginx
    }
    notify_master "/etc/keepalived/notify.sh master"
    notify_backup "/etc/keepalived/notify.sh backup"
    notify_fault "/etc/keepalived/notify.sh fault"
}
